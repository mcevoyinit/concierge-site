<!doctype html><html><head><meta charset="utf-8"><style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{background:radial-gradient(900px 500px at 72% -10%,#1b2030 0%,#0f1115 55%);
       color:#eef1f6;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;
       padding:84px 88px;display:flex;flex-direction:column;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:16px;font-size:30px;font-weight:700}
  .dot{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#e7b667,#f3d199);box-shadow:0 0 26px #e7b667}
  h1{font-size:82px;line-height:1.04;font-weight:800;letter-spacing:-1px}
  .g{background:linear-gradient(120deg,#e7b667,#f3d199);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:31px;color:#9aa3b2;margin-top:22px;max-width:900px}
  .cmd{margin-top:30px;display:inline-flex;align-items:center;gap:14px;background:#171a21;border:1px solid #2a2f3a;
       border-radius:14px;padding:18px 24px;font-family:ui-monospace,Menlo,monospace;font-size:26px;width:fit-content}
  .cmd .p{color:#6fcf97}
  .foot{font-size:24px;color:#9aa3b2}
</style></head><body>
  <div class="brand"><span class="dot"></span> Concierge</div>
  <div>
    <h1>Your AI assistant,<br><span class="g">set up in one paste.</span></h1>
    <div class="sub">Claude Code on your Mac with a curated pack of skills. Morning brief, email digest, research and more.</div>
    <div class="cmd"><span class="p">$</span> copy one line &nbsp;·&nbsp; paste in Terminal &nbsp;·&nbsp; done</div>
  </div>
  <div class="foot">macOS &nbsp;·&nbsp; about 2 minutes &nbsp;·&nbsp; free</div>
</body></html>
